name: kusala-email-verification-dev

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: kusala
      POSTGRES_PASSWORD: kusala
      POSTGRES_DB: kusala_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./spec/db-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  mailpit:
    image: docker.io/axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

  node-demo:
    build:
      context: .
      dockerfile: ./Containerfile.node-demo
    environment:
      DATABASE_URL: postgres://kusala:kusala@postgres:5432/kusala_dev
      ISSUER: kusala-studio
      BASE_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - mailpit

  django-demo:
    build:
      context: .
      dockerfile: ./Containerfile.django-demo
    environment:
      POSTGRES_DB: kusala_dev
      POSTGRES_USER: kusala
      POSTGRES_PASSWORD: kusala
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      ISSUER: kusala-studio
      BASE_URL: http://localhost:8000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mailpit

volumes:
  postgres_data: {}

